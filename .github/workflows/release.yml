name: release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  secret-scan:
    name: secret scan
    permissions:
      contents: read # Required to scan the immutable release commit history.
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Scan the immutable release commit with pinned Gitleaks
        env:
          GITLEAKS_ARCHIVE_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
          SHA: ${{ github.sha }}
        run: |
          [[ "$SHA" =~ ^[a-f0-9]{40}$ ]]
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          printf '%s  %s\n' "$GITLEAKS_ARCHIVE_SHA256" "$archive" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks
          test "$("${RUNNER_TEMP}/gitleaks" version)" = "$GITLEAKS_VERSION"
          "${RUNNER_TEMP}/gitleaks" git \
            --no-banner \
            --redact \
            --verbose \
            --log-opts="${SHA}^!" \
            .

  promote:
    name: promote existing artifacts
    needs: [secret-scan]
    permissions:
      actions: read # Required to download the protected-main evidence artifact.
      attestations: read # Required to verify protected-main provenance before promotion.
      contents: write # Required to create the immutable GitHub release.
      packages: write # Required to add the semantic tag to the existing GHCR manifest.
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE: ghcr.io/${{ github.repository }}
      REPOSITORY: ${{ github.repository }}
      SHA: ${{ github.sha }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Verify immutable semantic tag on main
        run: |
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$SHA" origin/main
          test "$(git rev-parse "$TAG^{commit}")" = "$SHA"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Locate protected-main evidence
        id: evidence
        run: |
          RUN_ID="$(gh api \
            "repos/${REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${SHA}&status=success&event=push" \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | first | .id')"
          test -n "$RUN_ID"
          gh run download "$RUN_ID" --name "symphony-main-${SHA}" --dir release-assets
          printf 'run_id=%s\n' "$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Verify checksums and commit evidence
        run: |
          cd release-assets
          sha256sum --check checksums.txt
          test "$(jq -r .commit build-manifest.json)" = "$SHA"
          test "$(jq -r .image build-manifest.json)" = "${IMAGE}@$(docker buildx imagetools inspect "${IMAGE}:sha-${SHA}" --format '{{json .Manifest.Digest}}' | jq -r .)"
          gh attestation verify "symphony-encore-${SHA}.tar.gz" --repo "$REPOSITORY"
      - name: Rescan the published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: "1"
          format: table
          ignore-unfixed: true
          image-ref: ${{ env.IMAGE }}:sha-${{ env.SHA }}
          severity: CRITICAL,HIGH
      - name: Publish release and promote without rebuilding
        run: |
          release_response=""
          if release_response="$(gh api \
            --method GET \
            --include \
            "repos/${REPOSITORY}/releases/tags/${TAG}" 2>/dev/null)"; then
            echo "release.preflight.github.exists" >&2
            exit 1
          fi
          release_status="$(printf '%s\n' "$release_response" | \
            sed -n 's/^HTTP\/[^ ]* \([0-9][0-9][0-9]\).*/\1/p' | tail -n 1)"
          if [[ "$release_status" != "404" ]]; then
            echo "release.preflight.github.unavailable" >&2
            exit 1
          fi

          image_probe_error="${RUNNER_TEMP}/symphony-image-preflight-error"
          if docker buildx imagetools inspect "${IMAGE}:${TAG}" >/dev/null 2>"$image_probe_error"; then
            rm -f "$image_probe_error"
            echo "release.preflight.image.exists" >&2
            exit 1
          fi
          image_absent=false
          image_reference="${IMAGE}:${TAG}"
          registry_manifest_path="/v2/${REPOSITORY}/manifests/${TAG}"
          while IFS= read -r provider_line || [[ -n "$provider_line" ]]; do
            provider_line_lower="${provider_line,,}"
            if [[ "$provider_line_lower" != *"${image_reference,,}"* && \
              "$provider_line_lower" != *"${registry_manifest_path,,}"* ]]; then
              continue
            fi
            if [[ "$provider_line_lower" =~ \
              (^|[^[:alnum:]_])(404|manifest[[:space:]]unknown|not[[:space:]]found)([^[:alnum:]_]|$) ]]; then
              image_absent=true
              break
            fi
          done < "$image_probe_error"
          if [[ "$image_absent" != "true" ]]; then
            rm -f "$image_probe_error"
            echo "release.preflight.image.unavailable" >&2
            exit 1
          fi
          rm -f "$image_probe_error"

          source_digest=""
          if ! source_digest="$(docker buildx imagetools inspect \
            "${IMAGE}:sha-${SHA}" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
            echo "release.preflight.source_digest_unavailable" >&2
            exit 1
          fi

          cleanup_required=true
          image_tag_attempted=false
          cleanup_release() {
            if [[ "$cleanup_required" == "true" ]]; then
              if gh release delete "$TAG" --yes >/dev/null 2>&1; then
                echo "release.cleanup.completed" >&2
              else
                echo "release.cleanup.failed" >&2
              fi
              if [[ "$image_tag_attempted" == "true" ]]; then
                echo "release.cleanup.image_tag_manual_required" >&2
              fi
            fi
          }
          trap cleanup_release EXIT

          gh release create "$TAG" release-assets/* \
            --draft \
            --generate-notes \
            --title "Symphony Encore ${TAG}" \
            --verify-tag
          gh release edit "$TAG" --draft=false
          image_tag_attempted=true
          if docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:sha-${SHA}"; then
            :
          else
            echo "release.promotion.image_failed" >&2
            exit 1
          fi
          promoted_digest=""
          if ! promoted_digest="$(docker buildx imagetools inspect \
            "${IMAGE}:${TAG}" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
            echo "release.promotion.digest_unavailable" >&2
            exit 1
          fi
          if [[ "$promoted_digest" != "$source_digest" ]]; then
            echo "release.promotion.digest_mismatch" >&2
            exit 1
          fi
          cleanup_required=false
          trap - EXIT
