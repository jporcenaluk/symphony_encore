name: ci

on:
  merge_group:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: corepack pnpm install --frozen-lockfile
      - run: make verify-fast
      - if: runner.os == 'Linux'
        run: make test-integration
      - if: runner.os == 'Linux'
        run: corepack pnpm exec playwright install --with-deps chromium
      - if: runner.os == 'Linux'
        run: make test-e2e
      - if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: ignore
          name: playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  supply-chain:
    name: supply chain
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          cache: false
          version: 1.7.12
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          online-audits: false
          persona: pedantic
          version: 1.26.1
      - if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node -e 'if (!/^(build|chore|ci|docs|feat|fix|perf|refactor|revert|test)(\([a-z0-9._-]+\))?!?: .+$/u.test(process.env.PR_TITLE ?? "")) process.exit(1)'
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
      - if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  image:
    name: image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: symphony-encore:verify
      - run: bash scripts/verify-container.sh symphony-encore:verify
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: "1"
          format: table
          ignore-unfixed: true
          image-ref: symphony-encore:verify
          severity: CRITICAL,HIGH

  required:
    name: required
    if: always()
    needs: [verify, supply-chain, image]
    runs-on: ubuntu-24.04
    steps:
      - env:
          IMAGE_RESULT: ${{ needs.image.result }}
          SUPPLY_CHAIN_RESULT: ${{ needs.supply-chain.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          test "$VERIFY_RESULT" = success
          test "$SUPPLY_CHAIN_RESULT" = success
          test "$IMAGE_RESULT" = success
